<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Cities - BreathX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body data-page="compare">
    <nav class="navbar">
        <a href="/" class="navbar-brand"><div class="logo">BX</div><span>BreathX</span></a>
        <ul class="navbar-menu">
            <li><a href="/">Home</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/compare" class="active">Compare</a></li>
            <li><a href="/alerts">Alerts</a></li>
            <li><a href="/recommendations">Health</a></li>
            <li><a href="/reports">Reports</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <section class="page-header">
            <div class="container">
                <h1 class="page-title">Compare Cities</h1>
                <p class="page-subtitle">Compare air quality between two cities side by side</p>
            </div>
        </section>

        <section class="container" style="margin-top: 2rem;">
            <div class="filters-bar">
                <div class="filter-group">
                    <label class="filter-label">First City</label>
                    <select class="form-select" id="city1-select">
                        <option value="Delhi">Delhi</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Kolkata">Kolkata</option>
                        <option value="Hyderabad">Hyderabad</option>
                        <option value="Pune">Pune</option>
                        <option value="Jaipur">Jaipur</option>
                        <option value="Lucknow">Lucknow</option>
                        <option value="Ahmedabad">Ahmedabad</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">Second City</label>
                    <select class="form-select" id="city2-select">
                        <option value="Mumbai">Mumbai</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Bangalore">Bangalore</option>
                        <option value="Chennai">Chennai</option>
                        <option value="Kolkata">Kolkata</option>
                        <option value="Hyderabad">Hyderabad</option>
                        <option value="Pune">Pune</option>
                        <option value="Jaipur">Jaipur</option>
                        <option value="Lucknow">Lucknow</option>
                        <option value="Ahmedabad">Ahmedabad</option>
                    </select>
                </div>
                <button id="compare-btn" class="btn btn-primary btn-lg">Compare</button>
            </div>

            <div id="comparison-result" style="margin-top: 2rem;">
                <div class="text-center text-muted" style="padding: 3rem;">
                    Select two cities and click Compare to see the analysis
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand"><h3>BreathX</h3><p>Urban Air Intelligence Platform</p></div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - BreathX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand"><div class="logo">BX</div><span>BreathX</span></a>
        <ul class="navbar-menu">
            <li><a href="/">Home</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/compare">Compare</a></li>
            <li><a href="/alerts">Alerts</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <section class="container text-center" style="padding: 6rem 1rem;">
            <div style="font-size: 6rem; font-weight: 700; color: var(--color-border);">404</div>
            <h1 style="margin-top: 1rem;">Page Not Found</h1>
            <p style="color: var(--color-text-secondary); margin-top: 1rem; margin-bottom: 2rem;">{{ message or 'The page you are looking for does not exist.' }}</p>
            <a href="/" class="btn btn-primary btn-lg">Return to Home</a>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand"><h3>BreathX</h3><p>Urban Air Intelligence Platform</p></div>
        </div>
    </footer>
</body>
</html>
